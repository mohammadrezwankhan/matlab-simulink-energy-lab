name: MATLAB validation

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "**/*.m"
      - "**/*.slx"
      - ".github/workflows/matlab-validation.yml"
  push:
    branches:
      - main
    paths:
      - "**/*.m"
      - "**/*.slx"
      - ".github/workflows/matlab-validation.yml"

permissions:
  contents: read

concurrency:
  group: matlab-validation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-examples:
    name: Validate executable examples
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up MATLAB R2026a
        uses: matlab-actions/setup-matlab@v3
        with:
          release: R2026a
          products: Simulink

      - name: Run model checks
        uses: matlab-actions/run-command@v3
        with:
          command: addpath('examples'); run_all_checks
